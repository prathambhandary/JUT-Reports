<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Yer Report — FireWave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="header.js"></script>
  <style>
/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
:root {
  --bg:        #06060c;
  --bg1:       #0b0b14;
  --bg2:       #10101e;
  --surface:   #1a1a2e;
  --surface2:  #1e1e34;
  --border:    #252540;
  --border2:   #32325a;

  --g0:        #ffd97a;
  --g1:        #f0c050;
  --g2:        #d4a030;
  --g3:        #8a5e10;

  --teal:      #3dd6c8;
  --violet:    #8060d8;
  --crimson:   #e03050;
  --green:     #28d880;
  --amber:     #f0a020;

  --t0:        #f0ece0;
  --t1:        #b8b0a0;
  --t2:        #706860;
  --t3:        #3a3430;

  --fdisplay:  'Cinzel Decorative', serif;
  --fheading:  'Cinzel', serif;
  --fbody:     'Lora', Georgia, serif;
  --fmono:     'Share Tech Mono', monospace;

  --tap-min:   44px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--t0);
  font-family: var(--fbody);
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ══ ATMOSPHERE ══ */
.atmo {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 100% 70% at 50% 0%, rgba(128,96,216,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 80% 50% at 0% 100%, rgba(61,214,200,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 70% 50% at 100% 80%, rgba(212,160,48,0.06) 0%, transparent 50%);
}
.noise {
  position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.022;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px;
}

/* ══ EMBERS ══ */
.embers { position: fixed; inset: 0; pointer-events: none; z-index: 2; }
.ember {
  position: absolute; border-radius: 50%;
  width: var(--sz, 2px); height: var(--sz, 2px);
  background: var(--col, var(--g0));
  opacity: 0; left: var(--x); bottom: -6px;
  animation: rise var(--dur) ease-in infinite var(--delay);
}
@keyframes rise {
  0%   { opacity: 0; transform: translateY(0) translateX(0); }
  10%  { opacity: 0.85; }
  85%  { opacity: 0.1; }
  100% { opacity: 0; transform: translateY(-92vh) translateX(calc(var(--sw)*38px)); }
}

/* ══ ROPE TOP ══ */
.rope-top {
  position: fixed; top: 0; left: 0; right: 0; height: 5px; z-index: 200;
  background: repeating-linear-gradient(90deg,
    var(--g3) 0px, var(--g2) 5px, var(--g3) 10px,
    #3a2808 14px, var(--g3) 18px);
  box-shadow: 0 0 18px rgba(212,160,48,0.35);
}

/* ══ LAYOUT ══ */
.page {
  position: relative; z-index: 10;
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 20px 40px;
  min-height: 100vh;
}

/* ══ CREST ANIMATION ══ */
.crest-wrap {
  position: relative; width: 100px; height: 100px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 24px;
}
.crest-ring {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(212,160,48,0.18);
  animation: spin-slow 14s linear infinite;
}
.cr-1 { inset: 0; }
.cr-2 { inset: 12px; border-style: dashed; animation-direction: reverse; animation-duration: 9s; }
.crest-glow {
  position: absolute; inset: 18px; border-radius: 50%;
  background: radial-gradient(circle, rgba(212,160,48,0.15) 0%, transparent 70%);
  animation: pglow 3s ease-in-out infinite;
}
@keyframes pglow { 0%,100%{opacity:.5;transform:scale(.95)} 50%{opacity:1;transform:scale(1.05)} }
@keyframes spin-slow { to { transform: rotate(360deg); } }
.crest-skull {
  font-size: 3rem; position: relative; z-index: 1;
  animation: bob 4s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(212,160,48,0.65));
}
@keyframes bob { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-10px) rotate(4deg)} }

/* ══ HERO TEXT ══ */
.hero-title {
  font-family: var(--fdisplay);
  font-size: clamp(1.6rem, 6vw, 2.8rem);
  font-weight: 900;
  text-align: center;
  background: linear-gradient(135deg, var(--g0) 20%, var(--g1) 55%, #b08020 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.03em; line-height: 1.15;
  margin-bottom: 8px;
  filter: drop-shadow(0 0 30px rgba(212,160,48,0.25));
}
.hero-sub {
  font-family: var(--fbody); font-style: italic;
  font-size: clamp(0.85rem, 2.2vw, 1rem);
  color: var(--t2); text-align: center;
  letter-spacing: 0.06em; margin-bottom: 36px;
}

/* ornament */
.ornament {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 28px; width: 100%; max-width: 500px;
}
.ornament-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--border2), transparent); }
.ornament-icon { color: var(--g2); font-size: 1rem; filter: drop-shadow(0 0 6px rgba(212,160,48,0.5)); }

/* ══ SEARCH CARD ══ */
.search-card {
  width: 100%; max-width: 540px;
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 32px 28px;
  position: relative; overflow: hidden;
  box-shadow:
    0 30px 80px rgba(0,0,0,0.6),
    0 0 0 1px rgba(255,255,255,0.02),
    inset 0 1px 0 rgba(255,255,255,0.04);
}
.search-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--g2), transparent);
}
.search-card::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(128,96,216,0.06) 0%, transparent 60%);
}

/* ══ INPUT FIELD ══ */
.input-section { position: relative; margin-bottom: 12px; }
.input-label {
  font-family: var(--fmono); font-size: 0.58rem;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--t2); display: block; margin-bottom: 8px;
}
.input-wrap {
  position: relative;
}
.input-icon {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  font-size: 1rem; color: var(--g3); pointer-events: none;
  transition: color 0.2s;
  z-index: 1;
}
.search-input {
  width: 100%;
  height: var(--tap-min);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0 44px 0 46px;
  color: var(--t0);
  font-family: var(--fmono); font-size: 0.9rem;
  letter-spacing: 0.06em;
  outline: none; caret-color: var(--g1);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input::placeholder { color: var(--t3); }
.search-input:focus {
  border-color: var(--g3);
  box-shadow: 0 0 0 3px rgba(212,160,48,0.1), 0 0 20px rgba(212,160,48,0.08);
}
.search-input:focus + .input-icon { display: none; }
.input-wrap:focus-within .input-icon { color: var(--g2); }

/* clear button */
.input-clear {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  width: 28px; height: 28px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
  color: var(--t2); cursor: pointer; font-size: 0.75rem;
  display: none; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.input-clear.visible { display: flex; }
.input-clear:hover { border-color: var(--crimson); color: var(--crimson); }

/* ══ RESULTS DROPDOWN ══ */
.results-drop {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 100;
  background: var(--bg1);
  border: 1px solid var(--border2);
  border-radius: 10px;
  overflow: hidden;
  display: none;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.03);
  max-height: 320px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
}
.results-drop.open { display: block; animation: drop-in 0.18s ease; }
@keyframes drop-in { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

.result-item {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.result-item:last-child { border-bottom: none; }
.result-item:hover, .result-item:focus { background: var(--surface); outline: none; }
.result-item:active { background: var(--surface2); }

/* avatar */
.result-avatar {
  width: 38px; height: 38px; flex-shrink: 0; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--fheading); font-size: 1rem; font-weight: 700;
  background: linear-gradient(135deg, var(--surface2), var(--bg2));
  border: 1px solid var(--border);
  color: var(--g1);
  transition: border-color 0.15s;
}
.result-item:hover .result-avatar { border-color: var(--g3); }

.result-info { flex: 1; min-width: 0; }
.result-name {
  font-family: var(--fheading); font-size: 0.86rem; font-weight: 600;
  color: var(--t0); letter-spacing: 0.04em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.result-name mark { background: transparent; color: var(--g0); font-style: italic; }
.result-meta {
  font-family: var(--fmono); font-size: 0.6rem;
  color: var(--t2); letter-spacing: 0.08em; margin-top: 2px;
}

.result-score-badge {
  flex-shrink: 0; text-align: right;
  font-family: var(--fmono); font-size: 0.68rem;
  color: var(--g1); letter-spacing: 0.06em;
  background: rgba(212,160,48,0.08);
  border: 1px solid var(--g3);
  padding: 3px 8px; border-radius: 4px;
  white-space: nowrap;
}

.no-results {
  padding: 24px 16px; text-align: center;
  font-family: var(--fbody); font-style: italic;
  color: var(--t2); font-size: 0.88rem;
}
.no-results-icon { font-size: 1.8rem; display: block; margin-bottom: 8px; opacity: 0.4; }

/* ══ STATUS BANNER ══ */
.status-banner {
  margin-top: 14px; padding: 12px 16px;
  border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface);
  display: flex; align-items: center; gap: 10px;
  font-family: var(--fmono); font-size: 0.7rem;
  letter-spacing: 0.08em; color: var(--t2);
  min-height: 0;
  transition: all 0.2s;
}
.status-banner.hidden { display: none; }
.status-banner.loading { border-color: var(--border2); }
.status-banner.ok  { border-color: rgba(40,216,128,0.3); background: rgba(40,216,128,0.06); color: var(--green); }
.status-banner.err { border-color: rgba(224,48,80,0.3);  background: rgba(224,48,80,0.06);  color: var(--crimson); }
.status-icon { font-size: 1rem; flex-shrink: 0; }
.status-dots { animation: dots 1.2s steps(3,end) infinite; }
@keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }

/* ══ SELECTED SAILOR CARD ══ */
.selected-card {
  display: none;
  margin-top: 14px; padding: 16px;
  background: linear-gradient(135deg, rgba(40,216,128,0.06), var(--bg2));
  border: 1px solid rgba(40,216,128,0.25);
  border-radius: 10px;
  align-items: center; gap: 14px;
}
.selected-card.visible { display: flex; animation: drop-in 0.2s ease; }
.selected-avatar-large {
  width: 52px; height: 52px; flex-shrink: 0; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--fheading); font-size: 1.4rem; font-weight: 700;
  background: linear-gradient(135deg, rgba(40,216,128,0.15), var(--surface2));
  border: 1px solid rgba(40,216,128,0.3);
  color: var(--green);
  box-shadow: 0 0 20px rgba(40,216,128,0.15);
}
.selected-info { flex: 1; min-width: 0; }
.selected-name {
  font-family: var(--fheading); font-size: 0.96rem; font-weight: 700;
  color: var(--t0); letter-spacing: 0.05em;
}
.selected-meta { font-family: var(--fmono); font-size: 0.62rem; color: var(--t2); margin-top: 4px; letter-spacing: 0.08em; }
.selected-check { font-size: 1.4rem; color: var(--green); flex-shrink: 0; }

/* ══ CTA BUTTON ══ */
.btn-go {
  width: 100%; height: 52px; margin-top: 16px;
  background: linear-gradient(135deg, var(--g2) 0%, var(--g1) 100%);
  border: none; border-radius: 8px;
  color: var(--bg);
  font-family: var(--fheading); font-size: 0.9rem; font-weight: 700;
  letter-spacing: 0.1em; cursor: pointer;
  transition: all 0.22s;
  box-shadow: 0 4px 20px rgba(212,160,48,0.3), 0 0 0 1px rgba(212,160,48,0.2);
  position: relative; overflow: hidden;
}
.btn-go::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
  opacity: 0; transition: opacity 0.2s;
}
.btn-go:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(212,160,48,0.45); }
.btn-go:hover:not(:disabled)::before { opacity: 1; }
.btn-go:active:not(:disabled) { transform: scale(0.98); transition-duration: 0.1s; }
.btn-go:disabled {
  background: var(--surface);
  color: var(--t2); border: 1px solid var(--border);
  box-shadow: none; cursor: not-allowed; transform: none;
}

/* ══ FOOTER LINK ══ */
.home-link {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 24px; text-align: center;
  font-family: var(--fmono); font-size: 0.68rem;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--t2); text-decoration: none;
  transition: color 0.2s;
}
.home-link:hover { color: var(--g1); }

/* ══ LOADING OVERLAY ══ */
#nav-loading {
  display: none; position: fixed; inset: 0; z-index: 800;
  background: var(--bg);
  flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}
#nav-loading.active { display: flex; }
.nav-load-icon { font-size: 3rem; animation: bob 1.5s ease-in-out infinite; filter: drop-shadow(0 0 20px rgba(212,160,48,0.6)); }
.nav-load-text { font-family: var(--fmono); font-size: 0.8rem; color: var(--t2); letter-spacing: 0.18em; text-transform: uppercase; }
.nav-load-bar-wrap { width: 200px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
.nav-load-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--g3), var(--g0)); animation: load-grow 0.8s ease forwards 0.1s; }
@keyframes load-grow { to { width: 100%; } }

/* ══ RESPONSIVE ══ */
@media (min-width: 600px) {
  .search-card { padding: 40px 36px; }
}
  </style>
</head>
<body>
<div class="atmo"></div>
<div class="noise"></div>
<div class="rope-top"></div>
<div class="embers" id="embers"></div>

<!-- Navigation loading overlay -->
<div id="nav-loading">
  <span class="nav-load-icon">☠️</span>
  <div class="nav-load-text">Setting sail<span class="status-dots">...</span></div>
  <div class="nav-load-bar-wrap"><div class="nav-load-bar"></div></div>
</div>

<div class="page">

  <!-- Crest -->
  <div class="crest-wrap">
    <div class="crest-ring cr-1"></div>
    <div class="crest-ring cr-2"></div>
    <div class="crest-glow"></div>
    <span class="crest-skull">☠️</span>
  </div>

  <h1 class="hero-title">Find Yer Report</h1>
  <p class="hero-sub">Search yer name — retrieve yer scroll from the archive</p>

  <div class="ornament">
    <div class="ornament-line"></div>
    <span class="ornament-icon">⚓</span>
    <div class="ornament-line"></div>
  </div>

  <div class="search-card">

    <div class="input-section">
      <label class="input-label" for="search-input">Sailor Name</label>
      <div class="input-wrap">
        <span class="input-icon">⚓</span>
        <input
          type="text" id="search-input"
          class="search-input"
          placeholder="Type yer name…"
          autocomplete="off" spellcheck="false"
          aria-label="Search for your name" aria-autocomplete="list"
          aria-controls="name-results"
        />
        <button class="input-clear" id="input-clear" aria-label="Clear search">✕</button>
        <div class="results-drop" id="name-results" role="listbox"></div>
      </div>
    </div>

    <!-- Status -->
    <div class="status-banner loading" id="status-banner">
      <span class="status-icon">⏳</span>
      <span id="status-text">Loading crew manifest<span class="status-dots">...</span></span>
    </div>

    <!-- Selected sailor -->
    <div class="selected-card" id="selected-card">
      <div class="selected-avatar-large" id="sel-avatar">?</div>
      <div class="selected-info">
        <div class="selected-name" id="sel-name">—</div>
        <div class="selected-meta" id="sel-meta">—</div>
      </div>
      <span class="selected-check">✓</span>
    </div>

    <button class="btn-go" id="btn-go" disabled>
      ⚓ &nbsp; Chart My Course
    </button>

    <a class="home-link" href="/">← Back to Port</a>

  </div>
</div>

<script>
/* ══ UTILS ══ */
const $ = s => document.querySelector(s);
const escRe = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

let students = [];
let selectedId = null;

/* ══ LOAD DATA ══ */
Papa.parse('./jut_student_results.csv', {
  header: true, download: true, skipEmptyLines: true, dynamicTyping: false,
  complete(res) {
    const map = {};
    res.data.forEach(r => {
      if (r.absent === '1') return;
      const sid = String(r.student_id || '').trim().replace(/\.0+$/, '');
      if (!sid) return;
      const jnum = parseInt(r.jut_number) || 0;
      if (!map[sid] || jnum > map[sid].jnum) {
        map[sid] = {
          student_id: sid,
          name: r.name || 'Unknown',
          latestScore: r.score || '—',
          latestRank: r.rank || '—',
          latestJut: (r.jut_id || '').toUpperCase(),
          grade: r.exam_grade || '',
          gender: r.gender || '',
          mentor: r.mentor || '',
          jnum,
        };
      }
    });
    students = Object.values(map).sort((a,b) => a.name.localeCompare(b.name));
    setStatus('hidden', '', '');
    $('#btn-go').disabled = true;
  },
  error() { setStatus('err', '🚨', 'Failed to load crew manifest — check CSV path.'); }
});

/* ══ STATUS ══ */
function setStatus(type, icon, text) {
  const b = $('#status-banner'), s = $('#status-text');
  b.className = 'status-banner ' + (type === 'hidden' ? 'hidden' : type);
  b.querySelector('.status-icon').textContent = icon;
  s.innerHTML = text;
}

/* ══ SEARCH ══ */
const input    = $('#search-input');
const drop     = $('#name-results');
const clearBtn = $('#input-clear');

function getInitial(name) {
  return (name || '?').trim().charAt(0).toUpperCase();
}

function renderDrop(items, query) {
  drop.innerHTML = '';
  if (!items.length) {
    drop.innerHTML = `<div class="no-results"><span class="no-results-icon">🌊</span>No sailor found by that name…</div>`;
    drop.classList.add('open');
    return;
  }
  const re = new RegExp(`(${escRe(query)})`, 'gi');
  items.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'result-item';
    div.role = 'option'; div.tabIndex = 0;
    div.dataset.idx = i;
    const metaParts = [s.gender, s.mentor ? `Mentor: ${s.mentor}` : null].filter(Boolean);
    div.innerHTML = `
      <div class="result-avatar">${getInitial(s.name)}</div>
      <div class="result-info">
        <div class="result-name">${s.name.replace(re, '<mark>$1</mark>')}</div>
        <div class="result-meta">${metaParts.join(' · ') || 'FireWave'}</div>
      </div>
      <div class="result-score-badge">${s.latestJut} · ${s.latestScore}</div>`;
    div.addEventListener('click', () => selectStudent(s));
    div.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') selectStudent(s); });
    drop.appendChild(div);
  });
  drop.classList.add('open');
}

function hideDrop() { drop.classList.remove('open'); drop.innerHTML = ''; }

function selectStudent(s) {
  selectedId = String(s.student_id || '').trim().replace(/\.0+$/, '');
  input.value = s.name;
  hideDrop();

  const metaParts = [s.gender, s.grade ? `Grade ${s.grade}` : null, s.mentor ? `Mentor: ${s.mentor}` : null].filter(Boolean);
  $('#sel-avatar').textContent = getInitial(s.name);
  $('#sel-name').textContent = s.name;
  $('#sel-meta').textContent = metaParts.join(' · ') + ` · Latest: ${s.latestJut} · Score ${s.latestScore}`;
  $('#selected-card').classList.add('visible');
  $('#btn-go').disabled = false;
  clearBtn.classList.add('visible');
  setStatus('hidden', '', '');
}

input.addEventListener('input', () => {
  const val = input.value.trim();
  selectedId = null;
  $('#btn-go').disabled = true;
  $('#selected-card').classList.remove('visible');
  clearBtn.classList.toggle('visible', val.length > 0);

  if (val.length < 2) { hideDrop(); return; }
  const matches = students.filter(s => s.name.toLowerCase().includes(val.toLowerCase())).slice(0, 10);
  renderDrop(matches, val);
});

clearBtn.addEventListener('click', () => {
  input.value = ''; selectedId = null;
  $('#btn-go').disabled = true;
  $('#selected-card').classList.remove('visible');
  clearBtn.classList.remove('visible');
  hideDrop(); setStatus('hidden', '', '');
  input.focus();
});

/* keyboard nav inside dropdown */
input.addEventListener('keydown', e => {
  const items = drop.querySelectorAll('.result-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); items[0].focus(); }
  if (e.key === 'Escape') { hideDrop(); }
  if (e.key === 'Enter' && selectedId) go();
});
drop.addEventListener('keydown', e => {
  const items = [...drop.querySelectorAll('.result-item')];
  const cur = document.activeElement;
  const idx = items.indexOf(cur);
  if (e.key === 'ArrowDown') { e.preventDefault(); items[Math.min(idx+1, items.length-1)]?.focus(); }
  if (e.key === 'ArrowUp')   { e.preventDefault(); idx > 0 ? items[idx-1].focus() : input.focus(); }
  if (e.key === 'Escape') { hideDrop(); input.focus(); }
});

document.addEventListener('click', e => {
  if (!$('#search-input').closest('.input-section').contains(e.target) &&
      !e.target.closest('.input-section')) hideDrop();
});

/* ══ NAVIGATE ══ */
function go() {
  if (!selectedId) return;
  $('#nav-loading').classList.add('active');
  setTimeout(() => {
    window.location.href = 'report.html?student=' + encodeURIComponent(selectedId);
  }, 600);
}
$('#btn-go').addEventListener('click', go);

/* ══ EMBERS ══ */
const ec = document.getElementById('embers');
const eCols = ['#f0c050','#e05a1a','#f0c050','#d4a030','#3dd6c8'];
for (let i = 0; i < 22; i++) {
  const e = document.createElement('div'); e.className = 'ember';
  const sz = Math.random() > .72 ? '3px' : '2px';
  e.style.cssText = `--x:${Math.random()*100}%;--dur:${(4+Math.random()*6).toFixed(1)}s;--delay:${(Math.random()*9).toFixed(1)}s;--sw:${(Math.random()*2-1).toFixed(2)};--col:${eCols[Math.floor(Math.random()*eCols.length)]};--sz:${sz};width:${sz};height:${sz}`;
  ec.appendChild(e);
}
</script>
</body>
