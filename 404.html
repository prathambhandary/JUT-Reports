<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
  <title>404 — Lost at Sea | FireWave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    :root {
      --ink:       #0a0806;
      --parch:     #1a1208; 
      --fog:       #3d3225;
      --gold:      #c8922a;
      --gold-hi:   #f0b840;
      --gold-dim:  #7a5518;
      --ember:     #e84c0e;
      --pale:      #d4c4a0;
      --muted:     #7a6a50;
      --red:       #c0392b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--ink);
      color: var(--pale);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* grain */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 1000;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: .5;
    }

    /* sea bg */
    .sea-bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 130% 60% at 50% 110%, #0a1f2e 0%, transparent 65%),
        radial-gradient(ellipse 80% 50% at 20% 80%, #0d1f30 0%, transparent 55%),
        linear-gradient(180deg, #0a0806 0%, #0d0b07 50%, #060e18 100%);
    }

    /* rope top */
    .rope-top {
      position: fixed; top: 0; left: 0; right: 0; height: 6px; z-index: 200;
      background: repeating-linear-gradient(
        90deg,
        var(--gold-dim) 0px, var(--gold) 4px,
        var(--gold-dim) 8px, #5a3e10 12px,
        var(--gold-dim) 16px
      );
      box-shadow: 0 2px 14px rgba(200,146,42,.35);
    }

    /* embers */
    .embers { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
    .ember {
      position: absolute; width: 2px; height: 2px; border-radius: 50%;
      background: var(--gold-hi); opacity: 0;
      left: var(--x); bottom: -4px;
      animation: rise var(--dur) ease-in infinite var(--delay);
    }
    @keyframes rise {
      0%   { opacity: 0; transform: translateY(0) translateX(0) scale(1); }
      10%  { opacity: .85; }
      80%  { opacity: .2; }
      100% { opacity: 0; transform: translateY(-90vh) translateX(calc(var(--sw) * 30px)) scale(.1); }
    }

    /* waves at bottom */
    .waves {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 120px; z-index: 1; overflow: hidden;
    }
    .wave {
      position: absolute; bottom: 0; left: -100%;
      width: 300%; height: 100%;
      background: radial-gradient(ellipse 50% 60% at 50% 100%, #0d2a3d 0%, transparent 70%);
      animation: sway var(--ws) ease-in-out infinite alternate;
      opacity: var(--wo);
    }
    @keyframes sway {
      0%   { transform: translateX(0); }
      100% { transform: translateX(12%); }
    }

    /* main content */
    .content {
      position: relative; z-index: 2;
      text-align: center;
      padding: 20px 30px;
      max-width: 680px;
    }

    /* ship SVG */
    .ship-wrap {
      margin-bottom: 24px;
      animation: drift 6s ease-in-out infinite;
      filter: drop-shadow(0 0 24px rgba(200,146,42,.25));
    }
    @keyframes drift {
      0%,100% { transform: translateY(0) rotate(-1.5deg); }
      50%      { transform: translateY(-14px) rotate(1.5deg); }
    }

    /* 404 number */
    .four-o-four {
      font-family: 'Uncial Antiqua', serif;
      font-size: clamp(5rem, 18vw, 10rem);
      color: var(--gold-hi);
      line-height: 1;
      text-shadow:
        0 0 40px rgba(240,184,64,.45),
        0 2px 0 #3a2000,
        0 6px 30px rgba(0,0,0,.9);
      animation: flicker 4s infinite;
      letter-spacing: .04em;
    }
    @keyframes flicker {
      0%,93%,100% { opacity: 1; }
      94%          { opacity: .78; }
      96%          { opacity: 1; }
      98%          { opacity: .88; }
    }

    /* divider */
    .divider {
      display: flex; align-items: center; gap: 14px;
      margin: 14px auto 20px;
      max-width: 380px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }
    .divider span { color: var(--gold); font-size: 1rem; }

    /* headline */
    .headline {
      font-family: 'Uncial Antiqua', serif;
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: var(--gold);
      letter-spacing: .05em;
      text-shadow: 0 0 20px rgba(200,146,42,.3);
      margin-bottom: 14px;
    }

    .subline {
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    /* coordinates display */
    .coords {
      font-family: 'Share Tech Mono', monospace;
      font-size: .75rem;
      color: var(--gold-dim);
      letter-spacing: .14em;
      margin-bottom: 32px;
      opacity: .7;
    }

    /* CTA button */
    .btn-home {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 34px;
      background: linear-gradient(145deg, #1e160a, #130e06);
      border: 1px solid var(--gold-dim);
      border-radius: 5px;
      color: var(--gold-hi);
      text-decoration: none;
      font-family: 'Uncial Antiqua', serif;
      font-size: 1rem;
      letter-spacing: .06em;
      transition: all .25s ease;
      position: relative; overflow: hidden;
    }
    .btn-home::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(145deg, rgba(200,146,42,.12), transparent);
      opacity: 0; transition: opacity .25s;
    }
    .btn-home:hover {
      border-color: var(--gold);
      box-shadow:
        0 0 22px rgba(200,146,42,.3),
        0 8px 28px rgba(0,0,0,.6);
      transform: translateY(-3px);
    }
    .btn-home:hover::before { opacity: 1; }
    .btn-home:active { transform: translateY(0) scale(.97); }

    /* small error code */
    .err-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: .68rem;
      color: var(--red);
      letter-spacing: .18em;
      margin-top: 28px;
      opacity: .6;
    }
  </style>
</head>
<body>

<div class="sea-bg"></div>
<div class="rope-top"></div>
<div class="embers" id="embers"></div>

<!-- waves -->
<div class="waves">
  <div class="wave" style="--ws:7s;--wo:.5;"></div>
  <div class="wave" style="--ws:9s;--wo:.3;bottom:-20px;"></div>
</div>

<div class="content">

  <!-- Sinking ship SVG -->
  <div class="ship-wrap">
    <svg width="200" height="140" viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg" fill="none">
      <!-- water line ripple -->
      <ellipse cx="100" cy="118" rx="80" ry="8" fill="rgba(13,42,61,.7)" />
      <ellipse cx="100" cy="118" rx="65" ry="5" fill="rgba(13,42,61,.5)" />

      <!-- hull -->
      <path d="M30 90 Q100 115 170 90 L155 105 Q100 128 45 105 Z" fill="#3a2a10" stroke="#c8922a" stroke-width="1.2"/>

      <!-- deck -->
      <rect x="40" y="80" width="120" height="14" rx="3" fill="#2a1e08" stroke="#7a5518" stroke-width="1"/>

      <!-- mast -->
      <line x1="100" y1="20" x2="100" y2="82" stroke="#5a3e10" stroke-width="3" stroke-linecap="round"/>

      <!-- crow's nest -->
      <rect x="88" y="32" width="24" height="12" rx="2" fill="#2a1e08" stroke="#7a5518" stroke-width="1"/>

      <!-- sail (torn) -->
      <path d="M102 22 L145 42 L138 70 L102 70 Z" fill="rgba(212,196,160,.12)" stroke="#7a5518" stroke-width="1" stroke-dasharray="4 3"/>
      <!-- tear lines on sail -->
      <line x1="118" y1="30" x2="112" y2="55" stroke="#5a3e10" stroke-width="1" opacity=".6"/>
      <line x1="130" y1="44" x2="125" y2="62" stroke="#5a3e10" stroke-width="1" opacity=".5"/>

      <!-- skull & crossbones flag -->
      <rect x="96" y="18" width="22" height="15" rx="2" fill="#0a0806" stroke="#c8922a" stroke-width="1"/>
      <circle cx="107" cy="23" r="4" fill="none" stroke="#f0b840" stroke-width="1"/>
      <line x1="103" y1="28" x2="111" y2="28" stroke="#f0b840" stroke-width="1"/>
      <line x1="101" y1="30" x2="113" y2="26" stroke="#f0b840" stroke-width=".8"/>
      <line x1="101" y1="26" x2="113" y2="30" stroke="#f0b840" stroke-width=".8"/>

      <!-- porthole -->
      <circle cx="70" cy="88" r="5" fill="none" stroke="#7a5518" stroke-width="1.2"/>
      <circle cx="130" cy="88" r="5" fill="none" stroke="#7a5518" stroke-width="1.2"/>

      <!-- anchor (sinking indicator) -->
      <text x="88" y="108" font-size="14" fill="#c8922a" opacity=".5" font-family="serif">⚓</text>

      <!-- splash drops -->
      <circle cx="50" cy="112" r="2" fill="rgba(13,52,77,.8)"/>
      <circle cx="152" cy="110" r="2.5" fill="rgba(13,52,77,.8)"/>
      <circle cx="35" cy="108" r="1.5" fill="rgba(13,52,77,.6)"/>
      <circle cx="165" cy="115" r="1.5" fill="rgba(13,52,77,.6)"/>
    </svg>
  </div>

  <div class="four-o-four">404</div>

  <div class="divider"><span>☠</span></div>

  <h1 class="headline">Lost at Sea, Sailor</h1>

  <p class="subline">
    The page ye seek has sunk to Davy Jones' Locker.<br>
    No map, no compass, no soul has found it since.
  </p>

  <div class="coords">
    LAT 13°N · LON 77°E &nbsp;·&nbsp; DEPTH: UNKNOWN &nbsp;·&nbsp; SIGNAL: DEAD
  </div>

  <a class="btn-home" href="/">
    ⚓ &nbsp; Return to Port
  </a>

  <div class="err-tag">ERR_404 · results.firewave.in · PAGE_NOT_FOUND</div>
</div>

<script>
  // Ember particles
  const ec = document.getElementById('embers');
  const cols = ['#f0b840','#e84c0e','#f0b840','#c8922a','#f0b840'];
  for (let i = 0; i < 22; i++) {
    const e = document.createElement('div');
    e.className = 'ember';
    e.style.setProperty('--x',     `${Math.random()*100}%`);
    e.style.setProperty('--dur',   `${(4+Math.random()*5).toFixed(1)}s`);
    e.style.setProperty('--delay', `${(Math.random()*8).toFixed(1)}s`);
    e.style.setProperty('--sw',    `${(Math.random()*2-1).toFixed(2)}`);
    e.style.background = cols[Math.floor(Math.random()*cols.length)];
    if (Math.random() > .72) { e.style.width='3px'; e.style.height='3px'; }
    ec.appendChild(e);
  }
</script>
</body>
</html>
